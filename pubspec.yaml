name: devil_run
description: "A one-screen trap platformer built with Flutter and Flame."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.2

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.7.1
  cupertino_icons: ^1.0.8
  flame: ^1.37.0
  shared_preferences: ^2.5.5
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
